alt: Square letterpress print. An even grid of circles and semicircles, nearly touching each other, is printed in dark gray ink. Some cells in this grid are occupied by a full circle, while others have only the top or the bottom half of a circle, and other cells are blank. Some columns of this grid have many full circles, while others have none, creating a pattern of uneven vertical bands. This pattern intersects with a more subtle pattern of diagonal bands, as if to be an abstraction of ripples overlapping on water.