alt: Square screen print. A thin white border surrounds a dark blue field. In the center is a white sun-like shape, a star with so many points it’s nearly a circle. Surrounding this sun are many small white dots, arranged irregularly like the stars in the sky, and connected with white lines. Rather than forming separate constellations, almost all these stars are connected into one complex network, and in many places the lines cross each other. The overall composition feels asymmetrical yet balanced.